<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Comprobantes Pro</title>

    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a73e8; }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .file-box { border: 2px dashed #ccc; padding: 15px; border-radius: 8px; text-align: center; }
        button { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #1a73e8; color: white; border: none; }
        .btn-primary:hover { background: #1557b0; }
        .btn-secondary { background: #6c757d; color: white; border: none; margin-top: 5px; }
        .result { margin-top: 25px; padding: 20px; border-radius: 8px; background: #fafafa; border: 1px solid #ddd; }
        .ok { color: #28a745; border-left: 5px solid #28a745; padding-left: 10px; }
        .diff { color: #dc3545; border-left: 5px solid #dc3545; padding-left: 10px; }
        .loading { color: #1a73e8; font-style: italic; text-align: center; }
        .summary-card { display: flex; justify-content: space-around; margin-bottom: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; }
        .list-diff { max-height: 300px; overflow-y: auto; background: #fff; border: 1px solid #eee; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 Comparador de Comprobantes</h1>
    
    <div class="upload-section">
        <div class="file-box">
            <label><b>Archivo Origen (Base)</b></label>
            <input type="file" id="file1" accept=".pdf,.xlsx,.xls,.csv,.txt,.jpg,.jpeg,.png">
        </div>
        <div class="file-box">
            <label><b>Archivo a Comparar</b></label>
            <input type="file" id="file2" accept=".pdf,.xlsx,.xls,.csv,.txt,.jpg,.jpeg,.png">
        </div>
    </div>

    <button class="btn-primary" onclick="comparar()">🔍 Iniciar Comparación</button>
    <button class="btn-secondary" onclick="reiniciar()">Limpiar</button>

    <div id="resultado" class="result" style="display:none;"></div>
</div>

<script>
// Configuración de PDF.js
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

/**
 * LÓGICA DE EXTRACCIÓN
 */
async function leerArchivo(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    
    if (ext === "pdf") return await leerPDF(file);
    if (["xlsx", "xls"].includes(ext)) return await leerExcel(file);
    if (["csv", "txt"].includes(ext)) return await leerTexto(file);
    if (["jpg", "jpeg", "png", "webp"].includes(ext)) return await leerImagen(file);
    
    throw new Error(`Formato .${ext} no soportado.`);
}

async function leerTexto(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsText(file);
    });
}

async function leerExcel(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            let texto = "";
            workbook.SheetNames.forEach(name => {
                texto += XLSX.utils.sheet_to_txt(workbook.Sheets[name]) + "\n";
            });
            resolve(texto);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

async function leerPDF(file) {
    const pdfData = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
    let texto = "";
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // El join con espacio es vital para evitar pegar números
        texto += content.items.map(s => s.str).join(" ") + "\n";
    }
    return texto;
}

async function leerImagen(file) {
    const worker = await Tesseract.createWorker('spa'); // Usamos español
    const ret = await worker.recognize(file);
    await worker.terminate();
    return ret.data.text;
}

/**
 * NORMALIZACIÓN Y COMPARACIÓN
 */
function extraerComprobantes(texto) {
    // Limpieza de caracteres comunes de error en OCR
    const limpio = texto.toUpperCase()
        .replace(/O/g, "0")
        .replace(/I|L/g, "1");

    // Regex mejorada: busca prefijos específicos y captura el número
    // Soporta: 1105-0001, 1105 0001, 11050001
    const regex = /(1101|1104|0104|3008|1105)[ \-_]?(\d{4,12})/g;
    const encontrados = new Set();
    
    let match;
    while ((match = regex.exec(limpio)) !== null) {
        const tipo = match[1];
        // Quitamos ceros a la izquierda del número para comparar "000123" como "123"
        const num = parseInt(match[2], 10).toString();
        encontrados.add(`${tipo}-${num}`);
    }
    return encontrados;
}

async function comparar() {
    const f1 = document.getElementById("file1").files[0];
    const f2 = document.getElementById("file2").files[0];
    const resDiv = document.getElementById("resultado");

    if (!f1 || !f2) return alert("Por favor, selecciona ambos archivos.");

    resDiv.style.display = "block";
    resDiv.innerHTML = '<p class="loading">⚙️ Procesando y analizando datos (esto puede tardar con OCR)...</p>';

    try {
        const [t1, t2] = await Promise.all([leerArchivo(f1), leerArchivo(f2)]);
        const set1 = extraerComprobantes(t1);
        const set2 = extraerComprobantes(t2);

        const faltanEn2 = [...set1].filter(x => !set2.has(x));
        const faltanEn1 = [...set2].filter(x => !set1.has(x));

        let html = `
            <div class="summary-card">
                <div><b>Archivo 1:</b> ${set1.size} items</div>
                <div><b>Archivo 2:</b> ${set2.size} items</div>
            </div>
        `;

        if (faltanEn1.length === 0 && faltanEn2.length === 0) {
            html += `<div class="ok">✅ ¡Coincidencia total! Todos los comprobantes están en ambos archivos.</div>`;
        } else {
            html += `<div class="diff">⚠️ Se detectaron discrepancias:</div><br>`;
            
            if (faltanEn2.length > 0) {
                html += `<b>Faltan en Archivo 2 (${faltanEn2.length}):</b>
                         <div class="list-diff">${faltanEn2.join('<br>')}</div><br>`;
            }
            if (faltanEn1.length > 0) {
                html += `<b>Faltan en Archivo 1 (${faltanEn1.length}):</b>
                         <div class="list-diff">${faltanEn1.join('<br>')}</div>`;
            }
        }
        resDiv.innerHTML = html;

    } catch (err) {
        resDiv.innerHTML = `<p class="diff">❌ Error: ${err.message}</p>`;
        console.error(err);
    }
}

function reiniciar() {
    document.getElementById("file1").value = "";
    document.getElementById("file2").value = "";
    const res = document.getElementById("resultado");
    res.innerHTML = "";
    res.style.display = "none";
}
</script>

</body>
</html>
