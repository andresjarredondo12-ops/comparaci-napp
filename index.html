<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparador de Comprobantes</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- EXCEL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    background:#eef2f7;
    padding:15px;
    border-radius:8px;
}

.ok{
    color:green;
    font-weight:bold;
    font-size:18px;
}

.diff{
    color:red;
    font-weight:bold;
}

.loading{
    color:#0d6efd;
    font-weight:bold;
}

pre{
    background:white;
    padding:10px;
    border-radius:5px;
    overflow:auto;
}

</style>

</head>

<body>

<div class="container">

<h1>📄 Comparador Inteligente</h1>

<input type="file" id="file1">
<input type="file" id="file2">

<button onclick="comparar()">
Comparar
</button>

<button onclick="reiniciar()">
Reiniciar
</button>

<div class="result" id="resultado"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

/* =====================================================
LECTURA GENERAL
===================================================== */

async function leerArchivo(file){

    const ext=file.name.split('.').pop().toLowerCase();

    if(ext==="pdf"){
        return await leerPDF(file);
    }

    if(ext==="xlsx" || ext==="xls"){
        return await leerExcel(file);
    }

    if(ext==="csv" || ext==="txt"){
        return await leerTexto(file);
    }

    if([
        "jpg",
        "jpeg",
        "png",
        "bmp",
        "webp"
    ].includes(ext)){

        return await leerImagen(file);
    }

    return "";
}

/* =====================================================
TXT
===================================================== */

async function leerTexto(file){

    return new Promise(resolve=>{

        const reader=new FileReader();

        reader.onload=e=>resolve(e.target.result);

        reader.readAsText(file);

    });
}

/* =====================================================
EXCEL
===================================================== */

async function leerExcel(file){

    return new Promise(resolve=>{

        const reader=new FileReader();

        reader.onload=function(e){

            const data=new Uint8Array(e.target.result);

            const workbook=XLSX.read(data,{
                type:'array'
            });

            let texto="";

            workbook.SheetNames.forEach(name=>{

                texto+=XLSX.utils.sheet_to_csv(
                    workbook.Sheets[name]
                );

                texto+="\n";
            });

            resolve(texto);
        }

        reader.readAsArrayBuffer(file);
    });
}

/* =====================================================
PDF
===================================================== */

async function leerPDF(file){

    const pdfData=await file.arrayBuffer();

    const pdf=await pdfjsLib.getDocument({
        data:pdfData
    }).promise;

    let texto="";

    for(let i=1;i<=pdf.numPages;i++){

        const page=await pdf.getPage(i);

        const content=await page.getTextContent();

        const strings=content.items.map(
            item=>item.str
        );

        texto+=strings.join(" ")+"\n";
    }

    return texto;
}

/* =====================================================
OCR IMAGEN
===================================================== */

async function leerImagen(file){

    const resultado=await Tesseract.recognize(
        file,
        'eng',
        {
            logger:m=>{

                if(m.status==="recognizing text"){

                    document.getElementById("resultado").innerHTML=
                    `
                    <p class="loading">
                    OCR:
                    ${parseInt(m.progress*100)}%
                    </p>
                    `;
                }
            }
        }
    );

    return resultado.data.text;
}

/* =====================================================
EXTRACCION SIMPLE Y PRECISA
===================================================== */

function extraerComprobantes(texto){

    // LIMPIEZA OCR
    texto=texto

    .replace(/O/g,"0")
    .replace(/o/g,"0")
    .replace(/I/g,"1")
    .replace(/l/g,"1")

    // QUITA BASURA
    .replace(/[^\d\s\-]/g," ");

    /*
    Detecta:
    1105-00007717
    1105 00007717
    110500007717
    */

    const regex=
    /(1101|1104|0104|3008|1105)[\s\-]*0*(\d{5,8})/g;

    const encontrados=new Set();

    let match;

    while((match=regex.exec(texto))!==null){

        let tipo=match[1];

        let numero=match[2];

        numero=numero.padStart(8,"0");

        encontrados.add(
            tipo+"-"+numero
        );
    }

    return encontrados;
}

/* =====================================================
COMPARAR
===================================================== */

function obtenerDiferencias(set1,set2){

    const faltanEn2=[];
    const faltanEn1=[];

    set1.forEach(item=>{

        if(!set2.has(item)){

            faltanEn2.push(item);
        }
    });

    set2.forEach(item=>{

        if(!set1.has(item)){

            faltanEn1.push(item);
        }
    });

    return {
        faltanEn1,
        faltanEn2
    };
}

/* =====================================================
PRINCIPAL
===================================================== */

async function comparar(){

    const file1=
    document.getElementById("file1").files[0];

    const file2=
    document.getElementById("file2").files[0];

    const resultado=
    document.getElementById("resultado");

    if(!file1 || !file2){

        alert("Subí ambos archivos");

        return;
    }

    resultado.innerHTML=
    `<p class="loading">Procesando...</p>`;

    try{

        const texto1=
        await leerArchivo(file1);

        const texto2=
        await leerArchivo(file2);

        const comprobantes1=
        extraerComprobantes(texto1);

        const comprobantes2=
        extraerComprobantes(texto2);

        console.log(comprobantes1);
        console.log(comprobantes2);

        const diferencias=
        obtenerDiferencias(
            comprobantes1,
            comprobantes2
        );

        let html="";

        html+=`
        <p>
        <b>Total Archivo 1:</b>
        ${comprobantes1.size}
        </p>
        `;

        html+=`
        <p>
        <b>Total Archivo 2:</b>
        ${comprobantes2.size}
        </p>
        `;

        if(
            diferencias.faltanEn1.length===0 &&
            diferencias.faltanEn2.length===0
        ){

            html+=`
            <p class="ok">
            ✅ Ambos archivos coinciden
            </p>
            `;

        }else{

            html+=`
            <p class="diff">
            ⚠ Se encontraron diferencias
            </p>
            `;

            if(diferencias.faltanEn2.length){

                html+=`
                <h3 class="diff">
                Faltan en Archivo 2
                </h3>
                `;

                diferencias.faltanEn2.forEach(x=>{

                    html+=`<p>${x}</p>`;
                });
            }

            if(diferencias.faltanEn1.length){

                html+=`
                <h3 class="diff">
                Faltan en Archivo 1
                </h3>
                `;

                diferencias.faltanEn1.forEach(x=>{

                    html+=`<p>${x}</p>`;
                });
            }
        }

        resultado.innerHTML=html;

    }catch(error){

        console.error(error);

        resultado.innerHTML=
        `
        <p class="diff">
        Error procesando archivos
        </p>
        `;
    }
}

/* =====================================================
REINICIAR
===================================================== */

function reiniciar(){

    document.getElementById("file1").value="";
    document.getElementById("file2").value="";
    document.getElementById("resultado").innerHTML="";
}

</script>

</body>
</html>
