<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparador Profesional de Remitos</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#eef2f7;
    border-radius:8px;
    white-space:pre-wrap;
}

.ok{
    color:green;
    font-weight:bold;
    font-size:18px;
}

.diff{
    color:red;
    font-weight:bold;
}

.loading{
    color:#0d6efd;
    font-weight:bold;
}

.preview{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.preview img{
    width:150px;
    border-radius:6px;
    border:1px solid #ccc;
}

.info{
    margin-top:15px;
    background:#fff3cd;
    padding:10px;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>📄 Comparador Profesional de Remitos</h1>

<label>Archivo 1:</label>
<input type="file" id="file1">

<label>Archivo 2:</label>
<input type="file" id="file2">

<button onclick="comparar()">Comparar Archivos</button>
<button onclick="reiniciar()">Reiniciar</button>

<div class="info">
✅ Soporta:
<br><br>
• PDF
<br>
• Excel (.xls / .xlsx)
<br>
• CSV / TXT
<br>
• Imágenes JPG / PNG / WEBP
<br>
• Capturas de pantalla
<br>
• Tablas como la imagen enviada
<br>
• Formatos:
1101 / 1104 / 0104 / 3008 / 1105
</div>

<div class="preview" id="preview"></div>

<div class="result" id="resultado"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let contenidoArchivo1="";
let contenidoArchivo2="";

/* =========================================================
LECTURA GENERAL
========================================================= */

async function leerArchivo(file){

    const extension=file.name.split('.').pop().toLowerCase();

    if(extension==="pdf"){
        return await leerPDF(file);
    }

    if(extension==="xlsx" || extension==="xls"){
        return await leerExcel(file);
    }

    if(extension==="csv" || extension==="txt"){
        return await leerTexto(file);
    }

    if([
        "jpg",
        "jpeg",
        "png",
        "bmp",
        "webp"
    ].includes(extension)){

        return await leerImagenOCR(file);
    }

    alert("Formato no soportado");

    return "";
}

/* =========================================================
TXT / CSV
========================================================= */

async function leerTexto(file){

    return new Promise(resolve=>{

        const reader=new FileReader();

        reader.onload=e=>resolve(e.target.result);

        reader.readAsText(file);

    });

}

/* =========================================================
EXCEL
========================================================= */

async function leerExcel(file){

    return new Promise(resolve=>{

        const reader=new FileReader();

        reader.onload=function(e){

            const data=new Uint8Array(e.target.result);

            const workbook=XLSX.read(data,{type:'array'});

            let texto="";

            workbook.SheetNames.forEach(name=>{

                texto+=XLSX.utils.sheet_to_csv(
                    workbook.Sheets[name]
                );

                texto+="\n";

            });

            resolve(texto);

        }

        reader.readAsArrayBuffer(file);

    });

}

/* =========================================================
PDF
========================================================= */

async function leerPDF(file){

    const pdfData=await file.arrayBuffer();

    const pdf=await pdfjsLib.getDocument({
        data:pdfData
    }).promise;

    let texto="";

    for(let i=1;i<=pdf.numPages;i++){

        const page=await pdf.getPage(i);

        const content=await page.getTextContent();

        const strings=content.items.map(
            item=>item.str
        );

        texto+=strings.join(" ")+"\n";
    }

    return texto;
}

/* =========================================================
OCR IMAGENES
========================================================= */

async function leerImagenOCR(file){

    mostrarPreview(file);

    document.getElementById("resultado").innerHTML=
    `<p class="loading">🧠 Leyendo imagen...</p>`;

    try{

        const resultado=await Tesseract.recognize(
            file,
            'spa+eng',
            {
                logger:m=>{

                    if(m.status==="recognizing text"){

                        document.getElementById("resultado").innerHTML=
                        `
                        <p class="loading">
                        🧠 OCR procesando...
                        ${parseInt(m.progress*100)}%
                        </p>
                        `;
                    }
                }
            }
        );

        return limpiarOCR(resultado.data.text);

    }catch(error){

        console.error(error);

        alert("Error OCR");

        return "";
    }
}

/* =========================================================
MEJORA TEXTO OCR
========================================================= */

function limpiarOCR(texto){

    return texto

    // Corrige errores típicos OCR
    .replace(/O/g,"0")
    .replace(/I/g,"1")
    .replace(/l/g,"1")

    // Limpia dobles espacios
    .replace(/\s+/g," ")

    // Limpia saltos raros
    .replace(/\n+/g,"\n");
}

/* =========================================================
PREVIEW IMAGEN
========================================================= */

function mostrarPreview(file){

    const preview=document.getElementById("preview");

    const reader=new FileReader();

    reader.onload=function(e){

        const img=document.createElement("img");

        img.src=e.target.result;

        preview.appendChild(img);
    }

    reader.readAsDataURL(file);
}

/* =========================================================
EXTRACCION DE COMPROBANTES / REMITOS
========================================================= */

function extraerRemitos(texto){

    /*
    Soporta:
    1105-00007717
    1105 00007717
    110500007717
    */

    const regex=
    /\b(1101|1104|0104|3008|1105)[-\s]?0*(\d{4,10})\b/g;

    let match;

    let set=new Set();

    while((match=regex.exec(texto))!==null){

        let punto=match[1];

        let numero=match[2];

        // Últimos 5 dígitos
        let ultimos5=numero.slice(-5);

        let clave=punto+"-"+ultimos5;

        set.add(clave);
    }

    return set;
}

/* =========================================================
BUSCAR LINEAS
========================================================= */

function lineasPorRemito(texto,remito){

    let lineas=texto.split(/\r?\n/);

    let coincidencias=lineas.filter(linea=>{

        return linea.includes(
            remito.split("-")[1]
        );

    });

    return coincidencias.length>0
        ? coincidencias.join("\n")
        : "No encontrado";
}

/* =========================================================
COMPARAR
========================================================= */

function compararSets(set1,set2){

    let faltanEn2=[];

    let faltanEn1=[];

    set1.forEach(valor=>{

        if(!set2.has(valor)){

            faltanEn2.push(valor);
        }
    });

    set2.forEach(valor=>{

        if(!set1.has(valor)){

            faltanEn1.push(valor);
        }
    });

    return {
        faltanEn1,
        faltanEn2
    };
}

/* =========================================================
FUNCION PRINCIPAL
========================================================= */

async function comparar(){

    const file1=
    document.getElementById("file1").files[0];

    const file2=
    document.getElementById("file2").files[0];

    const resultadoDiv=
    document.getElementById("resultado");

    if(!file1 || !file2){

        alert("Debes subir ambos archivos");

        return;
    }

    resultadoDiv.innerHTML=
    `<p class="loading">⏳ Procesando archivos...</p>`;

    try{

        contenidoArchivo1=
        await leerArchivo(file1);

        contenidoArchivo2=
        await leerArchivo(file2);

        console.log(contenidoArchivo1);
        console.log(contenidoArchivo2);

        const set1=
        extraerRemitos(contenidoArchivo1);

        const set2=
        extraerRemitos(contenidoArchivo2);

        const resultado=
        compararSets(set1,set2);

        let html="";

        html+=`
        <p><b>Total Archivo 1:</b> ${set1.size}</p>
        <p><b>Total Archivo 2:</b> ${set2.size}</p>
        `;

        if(
            resultado.faltanEn1.length===0 &&
            resultado.faltanEn2.length===0
        ){

            html+=`
            <p class="ok">
            ✅ Todos los comprobantes coinciden
            </p>
            `;

        }else{

            html+=`
            <p class="diff">
            ⚠ Se encontraron diferencias
            </p>
            `;

            // FALTAN EN 2
            if(resultado.faltanEn2.length>0){

                html+=`
                <p class="diff">
                Faltan en Archivo 2:
                </p>
                `;

                resultado.faltanEn2.forEach(r=>{

                    html+=`
                    <p class="diff">${r}</p>
                    `;

                    html+=`
                    <pre>
${lineasPorRemito(contenidoArchivo1,r)}
                    </pre>
                    `;
                });
            }

            // FALTAN EN 1
            if(resultado.faltanEn1.length>0){

                html+=`
                <p class="diff">
                Faltan en Archivo 1:
                </p>
                `;

                resultado.faltanEn1.forEach(r=>{

                    html+=`
                    <p class="diff">${r}</p>
                    `;

                    html+=`
                    <pre>
${lineasPorRemito(contenidoArchivo2,r)}
                    </pre>
                    `;
                });
            }
        }

        resultadoDiv.innerHTML=html;

    }catch(error){

        console.error(error);

        resultadoDiv.innerHTML=
        `
        <p class="diff">
        ❌ Error procesando archivos
        </p>
        `;
    }
}

/* =========================================================
REINICIAR
========================================================= */

function reiniciar(){

    document.getElementById("file1").value="";
    document.getElementById("file2").value="";
    document.getElementById("resultado").innerHTML="";
    document.getElementById("preview").innerHTML="";

    contenidoArchivo1="";
    contenidoArchivo2="";
}

</script>

</body>
</html>
