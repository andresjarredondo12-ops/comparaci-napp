<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparador de Comprobantes PRO</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f1f3f6;
    font-family:Segoe UI, Arial, sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:30px;
}

.upload-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.box{
    border:2px dashed #ccc;
    border-radius:10px;
    padding:20px;
    background:#fafafa;
}

.box label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
}

input[type=file]{
    width:100%;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    border:none;
    padding:14px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.btn-primary{
    background:#1565c0;
    color:#fff;
}

.btn-primary:hover{
    background:#0d47a1;
}

.btn-secondary{
    background:#6c757d;
    color:#fff;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fff;
    display:none;
}

.loading{
    text-align:center;
    color:#1565c0;
    font-weight:bold;
    padding:20px;
}

.success{
    background:#e8f5e9;
    color:#2e7d32;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:bold;
}

.error{
    background:#ffebee;
    color:#c62828;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:bold;
}

.summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.card{
    background:#eef4ff;
    border-radius:10px;
    padding:15px;
    text-align:center;
}

.card h3{
    margin:0;
    font-size:15px;
    color:#1565c0;
}

.card p{
    margin-top:10px;
    font-size:24px;
    font-weight:bold;
}

.list{
    max-height:300px;
    overflow:auto;
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-top:10px;
    font-family:Consolas, monospace;
}

@media(max-width:768px){

    .upload-grid{
        grid-template-columns:1fr;
    }

    .summary{
        grid-template-columns:1fr 1fr;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>📄 Comparador de Comprobantes PRO</h1>

    <div class="upload-grid">

        <div class="box">
            <label>Archivo Base</label>

            <input
                type="file"
                id="file1"
                accept=".pdf,.xlsx,.xls,.csv,.txt,.jpg,.jpeg,.png,.webp"
            >
        </div>

        <div class="box">
            <label>Archivo a Comparar</label>

            <input
                type="file"
                id="file2"
                accept=".pdf,.xlsx,.xls,.csv,.txt,.jpg,.jpeg,.png,.webp"
            >
        </div>

    </div>

    <div class="buttons">

        <button class="btn-primary" onclick="comparar()">
            🔍 Comparar
        </button>

        <button class="btn-secondary" onclick="reiniciar()">
            🧹 Limpiar
        </button>

    </div>

    <div id="resultado" class="result"></div>

</div>

<script>

/* ======================================================
   PDF CONFIG
====================================================== */

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

/* ======================================================
   LEER ARCHIVO
====================================================== */

async function leerArchivo(file){

    if(!file){
        throw new Error("Archivo inválido");
    }

    const nombre = file.name.toLowerCase();

    if(nombre.endsWith('.pdf')){
        return await leerPDF(file);
    }

    if(
        nombre.endsWith('.xlsx') ||
        nombre.endsWith('.xls')
    ){
        return await leerExcel(file);
    }

    if(
        nombre.endsWith('.csv') ||
        nombre.endsWith('.txt')
    ){
        return await leerTexto(file);
    }

    if(
        nombre.endsWith('.jpg') ||
        nombre.endsWith('.jpeg') ||
        nombre.endsWith('.png') ||
        nombre.endsWith('.webp')
    ){
        return await leerImagen(file);
    }

    throw new Error(
        "Formato no soportado"
    );
}

/* ======================================================
   LEER TXT
====================================================== */

async function leerTexto(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = e => {
            resolve(e.target.result || "");
        };

        reader.onerror = () => {
            reject(
                new Error("No se pudo leer TXT")
            );
        };

        reader.readAsText(file);
    });
}

/* ======================================================
   LEER EXCEL
====================================================== */

async function leerExcel(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = e => {

            try{

                const data =
                    new Uint8Array(e.target.result);

                const workbook = XLSX.read(data,{
                    type:'array'
                });

                let texto = '';

                workbook.SheetNames.forEach(sheetName=>{

                    const sheet =
                        workbook.Sheets[sheetName];

                    texto += XLSX.utils.sheet_to_csv(sheet);

                    texto += '\n';
                });

                resolve(texto);

            }catch(err){

                reject(
                    new Error(
                        "Error leyendo Excel"
                    )
                );
            }
        };

        reader.onerror = () => {
            reject(
                new Error(
                    "No se pudo abrir Excel"
                )
            );
        };

        reader.readAsArrayBuffer(file);
    });
}

/* ======================================================
   LEER PDF
====================================================== */

async function leerPDF(file){

    try{

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
            data:buffer
        }).promise;

        let texto = '';

        for(let i=1;i<=pdf.numPages;i++){

            const page = await pdf.getPage(i);

            const content =
                await page.getTextContent();

            const strings =
                content.items.map(
                    item => item.str
                );

            texto += strings.join(' ') + '\n';
        }

        return texto;

    }catch(err){

        throw new Error(
            "No se pudo leer el PDF"
        );
    }
}

/* ======================================================
   LEER IMAGEN CON OCR
====================================================== */

async function leerImagen(file){

    try{

        const worker =
            await Tesseract.createWorker('spa');

        const resultado =
            await worker.recognize(file);

        await worker.terminate();

        return resultado.data.text || '';

    }catch(err){

        throw new Error(
            "No se pudo leer la imagen JPG/PNG"
        );
    }
}

/* ======================================================
   EXTRAER COMPROBANTES
====================================================== */

function extraerComprobantes(texto){

    if(!texto){
        return new Set();
    }

    texto = texto
        .toUpperCase()
        .replace(/\r/g,' ')
        .replace(/\n/g,' ')
        .replace(/\s+/g,' ');

    /*
        FORMATOS SOPORTADOS:

        1105-00012345
        1105 00012345
        110500012345
        1105/00012345
    */

    const regex =
    /(1101|1104|0104|3008|1105)[\s\-\/]*0*(\d{3,12})/g;

    const encontrados = new Set();

    let match;

    while((match = regex.exec(texto)) !== null){

        const tipo = match[1];

        const numero = parseInt(match[2],10);

        if(!isNaN(numero)){

            encontrados.add(
                `${tipo}-${numero}`
            );
        }
    }

    return encontrados;
}

/* ======================================================
   COMPARAR
====================================================== */

async function comparar(){

    const f1 =
        document.getElementById('file1').files[0];

    const f2 =
        document.getElementById('file2').files[0];

    const resultado =
        document.getElementById('resultado');

    if(!f1 || !f2){

        alert(
            "Selecciona ambos archivos"
        );

        return;
    }

    resultado.style.display = 'block';

    resultado.innerHTML = `
        <div class="loading">
            ⚙️ Procesando archivos...
            <br><br>
            Si usas imágenes JPG puede tardar.
        </div>
    `;

    try{

        const [texto1,texto2] =
            await Promise.all([
                leerArchivo(f1),
                leerArchivo(f2)
            ]);

        const set1 =
            extraerComprobantes(texto1);

        const set2 =
            extraerComprobantes(texto2);

        const faltanEn2 =
            [...set1].filter(
                x => !set2.has(x)
            );

        const faltanEn1 =
            [...set2].filter(
                x => !set1.has(x)
            );

        let html = '';

        html += `
            <div class="summary">

                <div class="card">
                    <h3>Archivo 1</h3>
                    <p>${set1.size}</p>
                </div>

                <div class="card">
                    <h3>Archivo 2</h3>
                    <p>${set2.size}</p>
                </div>

                <div class="card">
                    <h3>Faltan en 1</h3>
                    <p>${faltanEn1.length}</p>
                </div>

                <div class="card">
                    <h3>Faltan en 2</h3>
                    <p>${faltanEn2.length}</p>
                </div>

            </div>
        `;

        if(
            faltanEn1.length === 0 &&
            faltanEn2.length === 0
        ){

            html += `
                <div class="success">
                    ✅ Coincidencia total.
                </div>
            `;
        }
        else{

            html += `
                <div class="error">
                    ⚠️ Se encontraron diferencias.
                </div>
            `;

            if(faltanEn2.length > 0){

                html += `
                    <h3>
                        Faltan en Archivo 2
                    </h3>

                    <div class="list">
                        ${faltanEn2.join('<br>')}
                    </div>
                `;
            }

            if(faltanEn1.length > 0){

                html += `
                    <h3>
                        Faltan en Archivo 1
                    </h3>

                    <div class="list">
                        ${faltanEn1.join('<br>')}
                    </div>
                `;
            }
        }

        resultado.innerHTML = html;

    }catch(err){

        console.error(err);

        resultado.innerHTML = `
            <div class="error">
                ❌ ${err.message}
            </div>
        `;
    }
}

/* ======================================================
   LIMPIAR
====================================================== */

function reiniciar(){

    document.getElementById('file1').value = '';

    document.getElementById('file2').value = '';

    const resultado =
        document.getElementById('resultado');

    resultado.innerHTML = '';

    resultado.style.display = 'none';
}

</script>

</body>
</html>
